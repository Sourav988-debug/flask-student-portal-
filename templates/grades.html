<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Grades</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-5">

    <!-- Page Heading -->
    <div class="text-center mb-4">
        <h3 class="grades-title">Academic Grades</h3>
        <p class="text-muted" style="font-size: 14px;">
            Grades are view-only and cannot be modified
        </p>
    </div>

    <!-- Grades Table -->
    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-bordered table-striped grades-table mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                </thead>
                <tbody>
                    {% for g in grades %}
                    <tr>
                        <td>{{ g[0] }}</td>
                        <td>{{ g[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        {% if grades|length == 0 %}
            <p class="text-center text-muted mt-3">
                No grades available.
            </p>
        {% endif %}
    </div>

    <!-- Back Button -->
    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-secondary">
            ← Back to Dashboard
        </a>
    </div>

</body>
</html>
