<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Settings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4" style="width: 100%; max-width: 460px;">

        <h3 class="text-center mb-2">Profile Settings</h3>
        <p class="text-center text-muted mb-4" style="font-size: 14px;">
            Update your personal and academic details
        </p>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="text" name="semester" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                Update Profile
            </button>
        </form>

        <div class="text-center mt-4" style="font-size: 14px;">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>

    </div>

</body>
</html>
