<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-5">

    <!-- Page Heading -->
    <div class="text-center mb-5">
        <h2 class="dashboard-title">Dashboard</h2>
        <p class="text-muted" style="font-size: 15px;">
            Student Profile Overview
        </p>
    </div>

    <div class="row g-4 justify-content-center">

        <!-- USER INFO CARD -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="mb-3">Profile Summary</h5>

                <p><strong>Name:</strong> {{ user[0] }}</p>
                <p><strong>Email:</strong> {{ user[1] }}</p>
                <p><strong>Phone:</strong> {{ user[2] }}</p>
                <p><strong>Department:</strong> {{ user[3] }}</p>
                <p><strong>Semester:</strong> {{ user[4] }}</p>
            </div>
        </div>

        <!-- ACTIONS CARD -->
        <div class="col-md-4">
            <div class="card p-4 text-center">
                <h5 class="mb-3">Actions</h5>

                <a href="/profile" class="btn btn-primary w-100 mb-2">
                    Edit Profile
                </a>

                <a href="/grades" class="btn btn-success w-100 mb-2">
                    View Grades
                </a>

                <a href="/logout" class="btn btn-danger w-100">
                    Logout
                </a>
            </div>
        </div>

    </div>

</body>
</html>
