<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4" style="width: 100%; max-width: 440px;">
        
        <h3 class="text-center mb-2">Create Account</h3>
        <p class="text-center text-muted mb-4" style="font-size: 14px;">
            Register to access your academic dashboard
        </p>
        {% if error %}<div class="alert alert-danger" role="alert">{{ error }}</div>{% endif %}
        <form method="POST">

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="10-digit number" required>
            </div>

            <!-- Department -->
            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" placeholder="CSE / ECE / ME etc." required>
            </div>

            <!-- Semester -->
            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="text" name="semester" class="form-control" placeholder="e.g. 4" required>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Sign Up
            </button>
        </form>

        <div class="text-center mt-3" style="font-size: 14px;">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</body>
</html>
