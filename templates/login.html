<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card p-4" style="width: 100%; max-width: 420px;">

        <h3 class="text-center mb-2">Login</h3>
        <p class="text-center text-muted mb-4" style="font-size: 14px;">
            Access your account
        </p>
        {% if error %}<div class="alert alert-danger" role="alert">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>
        </form>

        <div class="text-center mt-3" style="font-size: 14px;">
            Don’t have an account?
            <a href="/">Create one</a>
        </div>

    </div>

</body>
</html>
